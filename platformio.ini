[env:knomi_display]
platform         = espressif32
board            = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
framework        = arduino
upload_port      = COM51
monitor_port     = COM51
monitor_speed    = 115200
build_flags      =
                   -Isrc
                   -DBOARD_HAS_PSRAM
                   -DLOAD_GFXFF
lib_deps         =
                   TFT_eSPI=https://github.com/Bodmer/TFT_eSPI/archive/refs/tags/v2.5.0.zip
